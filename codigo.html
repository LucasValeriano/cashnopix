<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <title>CashNoPix - Código</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="style.css">
  <script
    src="https://cdn.utmify.com.br/scripts/utms/latest.js"
    data-utmify-prevent-xcod-sck
    data-utmify-prevent-subids
    async
    defer
  ></script>
<script src="pixel.js"></script>
</head>
<body>

<nav class="app-nav">
  <span class="nav-logo">CashNoPix</span>
  <span class="nav-balance" id="navBal">R$ 0,00</span>
</nav>

<div class="progress-section">
  <p class="progress-text">Seu progresso: <span id="progLabel">0/6</span></p>
  <div class="progress-track">
    <div class="progress-fill" id="progFill" style="width:0%"></div>
  </div>
</div>

<div class="codigo-page">

  <div class="alert-banner">
    <div class="alert-icon">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    PREENCHA O CÓDIGO PARA RECEBER O VALOR!
  </div>

  <div class="codigo-card">
    <div class="valor-row">
      <span class="valor-label">Valor:</span>
      <span class="valor-badge" id="valorBadge">R$ 0,00</span>
    </div>

    <h2 class="code-heading">CÓDIGO</h2>

    <div class="code-letters" id="codeLetters"></div>

    <p class="code-hint">Confirme o código acima para receber o valor</p>

    <div class="code-inputs">
      <input class="code-input" id="i0" type="text" maxlength="1"
             inputmode="text" autocomplete="off" autocorrect="off"
             autocapitalize="characters" spellcheck="false">
      <input class="code-input" id="i1" type="text" maxlength="1"
             inputmode="text" autocomplete="off" autocorrect="off"
             autocapitalize="characters" spellcheck="false">
      <input class="code-input" id="i2" type="text" maxlength="1"
             inputmode="text" autocomplete="off" autocorrect="off"
             autocapitalize="characters" spellcheck="false">
      <input class="code-input" id="i3" type="text" maxlength="1"
             inputmode="text" autocomplete="off" autocorrect="off"
             autocapitalize="characters" spellcheck="false">
    </div>
  </div>

</div>

<script src="sounds.js"></script>
<script src="backredirect.js"></script>
<script>
  const CHARS = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
  const genCode = () => Array.from({length:4}, () => CHARS[Math.floor(Math.random() * CHARS.length)]).join('');

  const AMOUNTS = [46.39, 43.66, 37.92, 41.28, 38.50, 44.10];

  let state = JSON.parse(localStorage.getItem('cnp') || '{}');
  if (!state.balance) state = { balance: 53.26, round: 0 };
  const round = state.round || 0;
  const amt   = AMOUNTS[round] ?? 42.00;

  document.getElementById('navBal').textContent     = 'R$ ' + state.balance.toFixed(2).replace('.', ',');
  document.getElementById('progLabel').textContent  = round + '/6';
  document.getElementById('progFill').style.width   = (round / 6 * 100) + '%';
  document.getElementById('valorBadge').textContent = 'R$ ' + amt.toFixed(2).replace('.', ',');

  const code = genCode();
  const lettersEl = document.getElementById('codeLetters');
  code.split('').forEach(ch => {
    const box = document.createElement('div');
    box.className = 'letter-box';
    box.textContent = ch;
    lettersEl.appendChild(box);
  });

  const inputs = [0,1,2,3].map(n => document.getElementById('i' + n));

  inputs.forEach((inp, idx) => {
    inp.addEventListener('keydown', e => {
      if (e.key === 'Backspace') {
        if (!inp.value && idx > 0) {
          inputs[idx-1].value = '';
          inputs[idx-1].classList.remove('filled','error');
          inputs[idx-1].focus();
        }
        inp.classList.remove('filled','error');
      }
    });

    inp.addEventListener('input', () => {
      const v = inp.value.replace(/[^a-zA-Z]/g,'').toUpperCase().slice(-1);
      inp.value = v;
      if (!v) { inp.classList.remove('filled'); return; }
      inp.classList.add('filled');
      inp.classList.remove('error');
      if (typeof SFX !== 'undefined') SFX.tick();
      if (idx < 3) inputs[idx+1].focus();
      else         setTimeout(checkCode, 100);
    });

    inp.addEventListener('focus', () => inp.select());
  });

  requestAnimationFrame(() => inputs[0].focus());

  function checkCode() {
    const entered = inputs.map(i => i.value).join('').toUpperCase();
    if (entered === code) {
      inputs.forEach(i => { i.classList.add('filled'); i.disabled = true; });
      if (typeof SFX !== 'undefined') SFX.success();
      localStorage.setItem('cnp', JSON.stringify(state));
      setTimeout(() => { window.location.href = 'avaliacao.html'; }, 650);
    } else {
      inputs.forEach(i => { i.classList.add('error'); i.classList.remove('filled'); });
      if (typeof SFX !== 'undefined') SFX.error();
      setTimeout(() => {
        inputs.forEach(i => { i.classList.remove('error'); i.value = ''; i.disabled = false; });
        inputs[0].focus();
      }, 900);
    }
  }
</script>
</body>
</html>
