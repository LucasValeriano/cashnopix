<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#064e3b">
  <title>CashNoPix - Bônus Especial</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="style.css">
  <script
    src="https://cdn.utmify.com.br/scripts/utms/latest.js"
    data-utmify-prevent-xcod-sck
    data-utmify-prevent-subids
    async
    defer
  ></script>
  <script src="pixel.js"></script>
</head>
<body>

<div id="particles" style="position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;"></div>

<div class="bonus-extra-page">
  <div class="bonus-extra-card">

    <div class="bonus-extra-icon">✨</div>
    <h1 class="bonus-extra-title">PARABÉNS!</h1>
    <p class="bonus-extra-desc">
      Você acaba de ganhar um <strong>BÔNUS EXTRA</strong> de indicação por ter completado todas as avaliações com sucesso!
    </p>

    <div class="bonus-extra-amount-box">
      <div class="be-lbl">VALOR DO BÔNUS:</div>
      <div class="be-val">R$ 50,00</div>
    </div>

    <div class="bonus-extra-total">
      O valor será somado ao seu saldo de saque imediatamente.
    </div>

    <button class="bonus-extra-btn" onclick="collect()">COLETAR BÔNUS E SACAR AGORA</button>

    <div class="bonus-extra-meta">
      🔒 Transferência Segura &nbsp;·&nbsp; 🏛️ Banco Central
    </div>

  </div>
</div>

<script src="sounds.js"></script>
<script>
  function collect() {
    const state = JSON.parse(localStorage.getItem('cnp') || '{}');
    state.balance = (state.balance || 0) + 50;
    localStorage.setItem('cnp', JSON.stringify(state));
    if (typeof SFX !== 'undefined') SFX.success();
    setTimeout(() => {
      window.location.href = 'cadastro.html';
    }, 600);
  }

  // Simple particles
  const p = document.getElementById('particles');
  for(let i=0; i<30; i++) {
    const d = document.createElement('div');
    d.style.position = 'absolute';
    d.style.width = '4px';
    d.style.height = '4px';
    d.style.background = '#10b981';
    d.style.left = Math.random()*100 + '%';
    d.style.top = Math.random()*100 + '%';
    d.style.opacity = Math.random();
    d.style.borderRadius = '50%';
    p.appendChild(d);
  }
</script>

</body>
</html>
